services:
  backend:
    build:
      context: ./backend
    container_name: mony
    restart: always
    ports:
      - "80:8000"          # serve directly on port 80, no nginx needed
    volumes:
      - ./sounds:/sounds:ro
      - ./data:/data
      - ./asound.conf:/etc/asound.conf:ro
    devices:
      - /dev/snd:/dev/snd  # pass audio hardware into container
    environment:
      - TZ=Europe/Amsterdam
    group_add:
      - audio              # ensure the mony user can access audio hardware
